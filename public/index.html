<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicalTrials MCP Server</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; margin: 0; }
    .card { max-width: 560px; padding: 32px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #94a3b8; line-height: 1.5; }
    code { background: #1e293b; padding: 2px 6px; border-radius: 5px; color: #38bdf8; }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ClinicalTrials.gov MCP Server</h1>
    <p>This is a Model Context Protocol (MCP) server. It is not a website — connect an MCP
      client to the Streamable HTTP endpoint:</p>
    <p><code>POST /mcp</code></p>
    <p>Health check: <a href="/health">/health</a></p>
    <p>See the <a href="https://github.com/davidfromkansas/clinical_trials_mcp_server">repository</a>
      for available tools and usage.</p>
  </div>
</body>
</html>
